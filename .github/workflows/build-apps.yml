name: build-apps
on:
  push:
    branches: [main]
    paths: ['apps/**']
  workflow_dispatch:
jobs:
  changed:
    runs-on: ubuntu-latest
    outputs:
      apps: ${{ steps.set.outputs.apps }}
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 2 }
      - id: set
        run: |
          before="${{ github.event.before }}"
          if [ -z "$before" ] || [ "$before" = "0000000000000000000000000000000000000000" ]; then
            # 首推 / workflow_dispatch: 无 before 基线 → 全量构建 (除 _template)
            changed=$(ls -d apps/*/ 2>/dev/null | awk -F/ '{print $2}' | grep -vx '_template' || true)
          else
            changed=$(git diff --name-only "$before" HEAD -- 'apps/*/**' \
              | awk -F/ '$1=="apps" && $2!="_template"{print $2}' | sort -u)
          fi
          echo "apps=$(printf '%s\n' $changed | jq -R . | jq -cs 'map(select(length>0))')" >> "$GITHUB_OUTPUT"
  build:
    needs: changed
    if: needs.changed.outputs.apps != '[]' && needs.changed.outputs.apps != ''
    runs-on: ubuntu-latest
    permissions: { contents: read, packages: write }
    strategy:
      fail-fast: false   # 独立 App 互不牵连: 一个失败不取消其余
      matrix:
        app: ${{ fromJSON(needs.changed.outputs.apps) }}
    steps:
      - uses: actions/checkout@v4
      - name: jq 结构快检
        run: |
          jq -e --arg s "${{ matrix.app }}" \
            '.slug==$s and (.name|length>0) and (.image|length>0) and (.port|numbers)' \
            "apps/${{ matrix.app }}/cartridge.json"
      - uses: redhat-actions/podman-login@v1
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: build & push
        run: |
          slug="${{ matrix.app }}"
          # manifest-only App (无 Dockerfile): 引用现成上游镜像 (内部 builtin / 第三方),
          # 不 CI 构建, 仅由 index job 聚合其 cartridge.json 上架货架 (Umbrel 式精选目录)。
          if [ ! -f "apps/$slug/Dockerfile" ]; then
            echo "manifest-only (无 Dockerfile): $slug — 跳过构建, 镜像引用现成上游"
            exit 0
          fi
          sha="${GITHUB_SHA::12}"
          owner="${GITHUB_REPOSITORY_OWNER,,}"   # ghcr 镜像名必须小写
          img="ghcr.io/${owner}/${slug}"
          podman build -t "$img:$sha" -t "$img:latest" "apps/$slug"
          podman push "$img:$sha"; podman push "$img:latest"
  index:
    needs: build
    if: always()   # 即便无镜像改动 (meta-only) 也刷新货架
    runs-on: ubuntu-latest
    permissions: { contents: write }   # 推 store-index 发布分支 (私有仓走 raw + PAT, 免 Pages 公开)
    steps:
      - uses: actions/checkout@v4
      - name: 聚合 + 推 store-index 孤儿分支
        run: |
          bash scripts/index.sh "$RUNNER_TEMP/index.json"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # 孤儿 commit: 只含 index.json, 无历史包袱 (commit-tree 无 -p = 无 parent);
          # 不切分支/不碰工作区, push -f 使 store-index 恒为单 commit 最新货架。
          blob=$(git hash-object -w "$RUNNER_TEMP/index.json")
          tree=$(printf '100644 blob %s\tindex.json\n' "$blob" | git mktree)
          commit=$(git commit-tree "$tree" -m "chore(store): 货架索引 ${GITHUB_SHA::12} [skip ci]")
          git update-ref refs/heads/store-index "$commit"
          git push -f origin store-index
